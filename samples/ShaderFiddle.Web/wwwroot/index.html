<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ShadowDusk — Shader Fiddle (KNI WebGL)</title>
    <base href="./" />
    <link href="css/app.css" rel="stylesheet" />
</head>

<body>

    <div id="app">
        <div id="loading">Loading the WASM runtime…</div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">x</a>
    </div>

    <!--
        Phase 24 headless-render harness hook (gated behind ?test=<size>).
        KNI's WebGL context does NOT request preserveDrawingBuffer, so after a
        frame is presented the drawing buffer is cleared and a Playwright
        screenshot / readback of the canvas comes back all-black. When ?test is
        present we wrap getContext to force preserveDrawingBuffer:true so the
        last rendered frame survives for pixel readback, and we remember the GL
        context so __sd_readback() can read it directly. Fully additive: with no
        ?test query the normal interactive app is untouched.
    -->
    <script>
        window.__sdTest = (function () {
            var params = new URLSearchParams(window.location.search);
            var raw = params.get('test');
            if (raw === null) return null;
            var size = parseInt(raw, 10);
            if (!Number.isFinite(size) || size <= 0) size = 512;

            var state = { size: size, gl: null };

            var origGetContext = HTMLCanvasElement.prototype.getContext;
            HTMLCanvasElement.prototype.getContext = function (type, attrs) {
                if (type === 'webgl' || type === 'webgl2' ||
                    type === 'experimental-webgl') {
                    attrs = attrs || {};
                    attrs.preserveDrawingBuffer = true;
                    var ctx = origGetContext.call(this, type, attrs);
                    state.gl = ctx;          // last WebGL context KNI created
                    return ctx;
                }
                return origGetContext.call(this, type, attrs);
            };

            return state;
        })();

        // Read the current WebGL drawing buffer as RGBA8 (row-major, top-left
        // origin to match desktop PNGs) and return a base64 string the test can
        // decode. Returns null if no context yet. WebGL readPixels origin is
        // bottom-left, so we vertically flip into the result.
        window.__sd_readback = function () {
            var t = window.__sdTest;
            if (!t || !t.gl) return null;
            var gl = t.gl;
            var w = gl.drawingBufferWidth;
            var h = gl.drawingBufferHeight;
            if (!w || !h) return null;
            var src = new Uint8Array(w * h * 4);
            gl.readPixels(0, 0, w, h, gl.RGBA, gl.UNSIGNED_BYTE, src);
            // Flip vertically into row-major top-left.
            var out = new Uint8Array(w * h * 4);
            var rowBytes = w * 4;
            for (var y = 0; y < h; y++) {
                var srcRow = (h - 1 - y) * rowBytes;
                var dstRow = y * rowBytes;
                out.set(src.subarray(srcRow, srcRow + rowBytes), dstRow);
            }
            // base64-encode (chunked to avoid call-stack limits).
            var binary = '';
            var CH = 0x8000;
            for (var i = 0; i < out.length; i += CH) {
                binary += String.fromCharCode.apply(
                    null, out.subarray(i, Math.min(i + CH, out.length)));
            }
            return { w: w, h: h, data: btoa(binary) };
        };
    </script>

    <!--
        Editor squiggle support. The error backdrop and the line-number gutter
        are separate elements behind/beside the textarea; keep them aligned by
        translating them to match the textarea's scroll position. Wired once
        (guarded by __sdWired) and re-applied by Blazor after every render.
    -->
    <script>
        window.sdEditorSync = function () {
            var ta = document.getElementById('sdEditor');
            if (!ta) return;
            if (!ta.__sdWired) {
                ta.__sdWired = true;
                ta.addEventListener('scroll', window.sdEditorSync);
            }
            var bd = document.getElementById('sdBackdropInner');
            var gt = document.getElementById('sdGutterInner');
            var x = ta.scrollLeft, y = ta.scrollTop;
            if (bd) bd.style.transform = 'translate(' + (-x) + 'px,' + (-y) + 'px)';
            if (gt) gt.style.transform = 'translateY(' + (-y) + 'px)';
        };

        window.sdEditorGotoLine = function (line) {
            var ta = document.getElementById('sdEditor');
            if (!ta || !(line > 0)) return;
            ta.focus();
            var cs = window.getComputedStyle(ta);
            var lh = parseFloat(cs.lineHeight);
            if (!Number.isFinite(lh)) lh = parseFloat(cs.fontSize) * 1.45;
            var padTop = parseFloat(cs.paddingTop) || 0;
            // Center the target line in the viewport when possible.
            ta.scrollTop = Math.max(0, (line - 1) * lh + padTop - ta.clientHeight / 2);
            window.sdEditorSync();
        };
    </script>

    <script src="_framework/blazor.webassembly.js" autostart="false"></script>
    <script type="module">
        // Brotli static decompression is disabled (the dev server serves
        // uncompressed assets); start Blazor directly.
        Blazor.start();
    </script>

    <!--
        KNI (nkast) WebGL JS interop shims, version 8.0.11.
        NOTE vs the upstream template: in 8.0.11 JSObject.js moved from the
        nkast.Wasm.Dom package to nkast.Wasm.JSInterop.
    -->
    <script src="_content/nkast.Wasm.JSInterop/js/JSObject.8.0.11.js"></script>
    <script src="_content/nkast.Wasm.Dom/js/Window.8.0.11.js"></script>
    <script src="_content/nkast.Wasm.Dom/js/Document.8.0.11.js"></script>
    <script src="_content/nkast.Wasm.Dom/js/Navigator.8.0.11.js"></script>
    <script src="_content/nkast.Wasm.Dom/js/Gamepad.8.0.11.js"></script>
    <script src="_content/nkast.Wasm.Dom/js/Media.8.0.11.js"></script>
    <script src="_content/nkast.Wasm.XHR/js/XHR.8.0.11.js"></script>
    <script src="_content/nkast.Wasm.Canvas/js/Canvas.8.0.11.js"></script>
    <script src="_content/nkast.Wasm.Canvas/js/CanvasGLContext.8.0.11.js"></script>
    <script src="_content/nkast.Wasm.Audio/js/Audio.8.0.11.js"></script>
    <script src="_content/nkast.Wasm.XR/js/XR.8.0.11.js"></script>

    <script>
        function tickJS() {
            window.theInstance.invokeMethod('TickDotNet');
            window.requestAnimationFrame(tickJS);
        }

        window.initRenderJS = (instance) => {
            window.theInstance = instance;

            // Size the canvas to its holder before the game boots. In test
            // mode (?test=<size>) pin a fixed square so the headless capture and
            // the desktop reference share an exact resolution.
            var canvas = document.getElementById('theCanvas');
            var holder = document.getElementById('canvasHolder');
            if (window.__sdTest) {
                var s = window.__sdTest.size;
                canvas.width = s;
                canvas.height = s;
            } else {
                canvas.width = holder.clientWidth;
                canvas.height = holder.clientHeight;
            }
            canvas.addEventListener("contextmenu", e => e.preventDefault());

            // Begin the game loop.
            window.requestAnimationFrame(tickJS);
        };
    </script>
</body>

</html>
