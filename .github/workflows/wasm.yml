# .github/workflows/wasm.yml
# Phase 30 §16 — WASM build + headless-browser render validation. This is the
# workflow Phases 22/23/24/100 defer their browser/WASM proof to.
#
# It is SEPARATE from the desktop matrix (different toolchain, slower, browser-gated)
# and never blocks the fast unit CI. The HEAVY render jobs (wasm-build, browser-smoke)
# run on manual dispatch or PRs labelled `run-browser` ONLY — deliberately not
# per-push. The LIGHT vkd3d-export-gate job is the standing coverage: it runs on every
# push to main and on a daily schedule, so the G2 byte-identity gate and the
# SD1902/SD1903 scenarios cannot rot unobserved between labelled runs.
#
# Three jobs:
#   wasm-build        — wasm-tools workload (emscripten 3.1.34 pin), build/publish the
#                       net8.0-browser ShadowDusk.Wasm + ShaderFiddle.Web sample, and
#                       pack ShadowDusk.Wasm (the 6th NuGet package) IF the gitignored
#                       dxcompiler.wasm is present (its VerifyDxcWasmPresent target
#                       hard-fails the pack otherwise — see §17.2).
#   browser-smoke     — Phase 24 Playwright harness: mode-1 render + the Phase 33
#                       issue-#7 HiDef/WebGL2 regression guard (--corpus=sd-hidef),
#                       plus the node G1 seam gate and the Phase 4.1 G2 browser gate.
#   vkd3d-export-gate — standing (push-to-main + daily) minimal run of ONLY
#                       browser-vkd3d-gate.mjs --require-module: pure compile, no
#                       GPU/xvfb, headless Chromium byte-identity vs the manifest.
#
# ── KNOWN STUBS / RUNTIME-ONLY (flagged per §16) ──────────────────────────────
#   * The faithful DXC->WASM module (dxcompiler.wasm, ~17.4 MB) and spirv-cross.wasm
#     are GITIGNORED, out-of-band emscripten builds (tools/restore.* document the
#     recipe; .wasm-build/ holds the scripts). CI cannot reconstruct them from a clean
#     checkout without the multi-GB DXC/LLVM source build, so:
#       - the Wasm PACK step is GUARDED on the .wasm being present and SKIPS cleanly
#         when it is absent (logging why) rather than red-failing the workflow;
#       - the mode-2 faithful in-browser-compile smoke (§16.3) is likewise guarded.
#     To make these unconditional, host the pinned .wasm artifacts (SHA-256-verified,
#     §16.1) so tools/restore.* can download them — tracked as the open §16 tail.
#   * mode-1 + the HiDef issue-#7 guard need ONLY the committed sample + KNI runtime,
#     so they run unconditionally and are the load-bearing browser gate here.
name: WASM & Browser

on:
  # The HEAVY jobs are on-demand only. ShadowDusk ships a LIBRARY (the browser app is
  # only a sample / test rig), so the heavy browser+WASM render checks are NOT a
  # per-push gate (per-push heavy runs were the source of the red "WASM & Browser"
  # badge and most of the Actions noise). Run them deliberately: manual dispatch, or
  # add the `run-browser` label to a PR (`labeled` is included so the label
  # (re)triggers it). The push/schedule triggers below feed ONLY the cheap
  # vkd3d-export-gate job (pure compile, no GPU) — each job's `if:` selects which
  # events it answers to.
  workflow_dispatch:
  pull_request:
    branches: [ main ]
    types: [ opened, synchronize, reopened, labeled ]
  push:
    branches: [ main ]
  schedule:
    # Daily standing run of the cheap export gate, so the G2 byte-identity proof and
    # the SD1902/SD1903 scenarios can't rot unobserved when no one pushes or labels.
    - cron: '17 5 * * *'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: '1'
  DOTNET_NOLOGO: '1'
  DOTNET_CLI_TELEMETRY_OPTOUT: '1'
  # emscripten pin = the .NET 8 WASM runtime version; a mismatch fails at link/load,
  # not cleanly (Phase 23 hard constraint). The wasm-tools workload carries this; any
  # native emscripten build (spirv-cross.wasm / the faithful dxcompiler.wasm) must use
  # the same 3.1.34 via tools/restore.*.
  EMSCRIPTEN_VERSION: '3.1.34'

jobs:
  # ── Build the WASM sample + pack ShadowDusk.Wasm ───────────────────────────
  wasm-build:
    name: WASM build & pack
    runs-on: ubuntu-latest
    # On-demand (heavy): manual dispatch or a PR labelled run-browser. Pushes and the
    # schedule run only the cheap vkd3d-export-gate job below.
    if: |
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.pull_request.labels.*.name, 'run-browser')
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Cache NuGet
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-wasm-${{ runner.os }}-${{ hashFiles('**/packages.lock.json', '**/Directory.Packages.props') }}
          restore-keys: |
            nuget-wasm-${{ runner.os }}-

      - name: Install WASM workload (carries emscripten ${{ env.EMSCRIPTEN_VERSION }})
        run: dotnet workload install wasm-tools

      # Restore the gitignored WASM native artifacts (dxcompiler.wasm / spirv-cross.wasm).
      # The script warns-and-continues for absent out-of-band artifacts; whether they
      # landed gates the Wasm pack + the faithful mode-2 smoke below. No `|| true`:
      # a non-zero exit is a genuine script failure that must go red.
      - name: Restore WASM native artifacts
        run: |
          chmod +x tools/restore.sh
          ./tools/restore.sh

      - name: Check faithful DXC->WASM presence
        id: dxcwasm
        run: |
          if [ -f src/ShadowDusk.Wasm/wwwroot/dxc/dxcompiler.wasm ]; then
            echo "present=true"  >> "$GITHUB_OUTPUT"
            echo "dxcompiler.wasm present — Wasm build/pack + faithful smoke ENABLED."
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::warning::dxcompiler.wasm absent (gitignored, out-of-band emscripten build). Skipping ShadowDusk.Wasm build/pack + faithful mode-2 smoke. See tools/restore.sh recipe / §16 open tail."
          fi

      - name: dotnet restore (browser projects)
        if: steps.dxcwasm.outputs.present == 'true'
        run: |
          dotnet restore src/ShadowDusk.Wasm/ShadowDusk.Wasm.csproj
          dotnet restore samples/ShaderFiddle.Web/ShaderFiddle.Web.csproj

      - name: Publish ShaderFiddle.Web (net8.0-browser)
        if: steps.dxcwasm.outputs.present == 'true'
        run: >
          dotnet publish samples/ShaderFiddle.Web/ShaderFiddle.Web.csproj
          -c Release -o publish/shaderfiddle --no-restore

      - name: Verify WASM publish output
        if: steps.dxcwasm.outputs.present == 'true'
        run: |
          fw=publish/shaderfiddle/wwwroot/_framework
          test -d "$fw" || (echo "::error::_framework/ missing in publish output" && exit 1)
          ls "$fw"/*.wasm >/dev/null 2>&1 || (echo "::error::no _framework/*.wasm in publish output" && exit 1)
          echo "WASM publish OK — _framework/*.wasm present."

      - name: Pack ShadowDusk.Wasm (6th NuGet package)
        if: steps.dxcwasm.outputs.present == 'true'
        run: >
          dotnet pack src/ShadowDusk.Wasm/ShadowDusk.Wasm.csproj
          -c Release -o nupkg --no-restore
          /p:Version=$(grep -oP '<Version>\K[^<]+' Directory.Build.props | head -n1)
          /p:IncludeSymbols=true /p:SymbolPackageFormat=snupkg

      # Uploaded for the Release workflow's nuget-push to glob alongside the desktop set.
      - name: Upload Wasm package
        if: steps.dxcwasm.outputs.present == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: nupkg-wasm
          path: |
            nupkg/ShadowDusk.Wasm.*.nupkg
            nupkg/ShadowDusk.Wasm.*.snupkg
          if-no-files-found: error
          retention-days: 30

  # ── Headless-browser render smoke (Phase 24 harness) ───────────────────────
  browser-smoke:
    name: Browser render smoke
    runs-on: ubuntu-latest
    # On-demand (heavy): manual dispatch or a PR labelled run-browser.
    if: |
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.pull_request.labels.*.name, 'run-browser')
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Cache NuGet
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-wasm-${{ runner.os }}-${{ hashFiles('**/packages.lock.json', '**/Directory.Packages.props') }}
          restore-keys: |
            nuget-wasm-${{ runner.os }}-

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          # Node 20 is EOL (April 2026); 24 is the active LTS the runners default to
          # from 2026-06-16. The harness (Playwright + pngjs) is version-agnostic here.
          node-version: '24'

      - name: Install WASM workload
        run: dotnet workload install wasm-tools

      # No `|| true`: a non-zero exit is a genuine script failure that must go red.
      - name: Restore native tools
        run: |
          chmod +x tools/restore.sh
          ./tools/restore.sh

      # HARD GATE (the soft-skip-chain fix, 2026-06-12 review): the vkd3d->WASM module
      # is a hosted, pinned download — if it isn't in the package wwwroot after restore,
      # the restore infrastructure failed and the G1/G2 gates below would degrade.
      # Fail here with a precise message instead.
      - name: Verify vkd3d-shader WASM module restored (hard gate)
        run: |
          missing=0
          for f in \
            'src/ShadowDusk.Wasm/wwwroot/vkd3d/vkd3d-shader.js' \
            'src/ShadowDusk.Wasm/wwwroot/vkd3d/vkd3d-shader.wasm' ; do
              if [ ! -f "$f" ]; then
                echo "::error::restored WASM artifact missing: $f — tools/restore.sh failed to download the pinned native-vkd3d-wasm-1.17 asset."
                missing=1
              fi
          done
          exit $missing

      # Phase 21 AV-allowance note doesn't apply on GitHub-hosted Linux (no Defender),
      # but generous timeouts here cover cold WASM publish + first Chromium launch.
      - name: Install harness deps (Playwright + pngjs)
        working-directory: tests/ShadowDusk.BrowserTests
        run: npm install

      - name: Install Playwright Chromium
        working-directory: tests/ShadowDusk.BrowserTests
        run: npx playwright install --with-deps chromium

      # The harness's RefRenderer is a real MonoGame DesktopGL app (the desktop
      # baseline of the pixel compare). Headless runners have no display or GPU, so
      # give it an X virtual framebuffer + Mesa's software rasterizer (llvmpipe).
      # Until the Phase 37 B wchar_t fix the job died earlier (corpus compile ICE)
      # and never reached this wall.
      - name: Install xvfb + Mesa software GL (DesktopGL reference renderer)
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libgl1-mesa-dri libglu1-mesa

      # ── mode-1: precompiled .mgfx load + render in KNI WebGL (Reach baseline) ──
      # Uses deterministic software GL (ANGLE/SwiftShader) inside the harness so the
      # pixel compare reproduces across runners; the DesktopGL baseline renders on
      # Mesa llvmpipe under xvfb (LIBGL_ALWAYS_SOFTWARE pins the software path even
      # if a GPU device node exists).
      - name: Mode-1 render smoke (KNI Reach / WebGL1)
        working-directory: tests/ShadowDusk.BrowserTests
        timeout-minutes: 25
        env:
          LIBGL_ALWAYS_SOFTWARE: "1"
        run: |
          xvfb-run -a node publish-sample-sd.mjs
          xvfb-run -a node run-harness.mjs --corpus=sd

      # ── Phase 33 / issue #7 regression guard: KNI HiDef / WebGL2 (GLSL ES 3.00) ──
      # The harness returns 0 for BOTH a clean GREEN and a reproduced-RED (its original
      # Task-0 semantics), so the exit code alone is NOT a regression guard. Assert the
      # GREEN results file was written and the RED repro file was NOT — a regression to a
      # raw gl_FragColor write would flip the harness to RED and trip this.
      - name: Issue #7 HiDef/WebGL2 regression guard
        working-directory: tests/ShadowDusk.BrowserTests
        timeout-minutes: 25
        env:
          LIBGL_ALWAYS_SOFTWARE: "1"
        run: |
          rm -f RESULTS-SD-HIDEF.md RESULTS-SD-HIDEF-REPRO.md
          xvfb-run -a node publish-sample-sd-hidef.mjs
          xvfb-run -a node run-harness.mjs --corpus=sd-hidef
          if [ -f RESULTS-SD-HIDEF-REPRO.md ]; then
            echo "::error::issue #7 REGRESSED — KNI HiDef/WebGL2 reproduced the gl_FragColor load failure (RESULTS-SD-HIDEF-REPRO.md written)."
            cat RESULTS-SD-HIDEF-REPRO.md
            exit 1
          fi
          if [ ! -f RESULTS-SD-HIDEF.md ]; then
            echo "::error::HiDef harness wrote neither GREEN nor RED results — ambiguous/failed run."
            exit 1
          fi
          echo "GREEN — issue #7 guard holds: corpus loads + renders in KNI HiDef/WebGL2."

      # ── Phase 4.1 G2 — in-browser DirectX/FNA EXPORT byte-identity (real browser) ──
      # A browser cannot render DXBC/D3D9 bytecode, so the honest G2 analogue for the
      # DX/FNA EXPORT targets is byte-identity: headless Chromium runs the REAL
      # WasmShaderCompiler (.NET-browser runtime, real HTTP fetch of vkd3d-shader.wasm
      # restored above from native-vkd3d-wasm-1.17) over the FULL DX+FNA byte-identity
      # corpus, and every artifact's SHA-256 must equal the committed cross-host
      # manifest (tests/fixtures/golden/byte-identity/manifest.json) — the same device
      # Phase 37 uses to transfer the desktop rung-4 render proofs across hosts, with
      # the browser as the fourth host. Skips LOUDLY (exit 0 + ::warning::, never a
      # fabricated pass) only when vkd3d-shader.{js,wasm} is not restored; any compile
      # failure or hash mismatch is red. Pure compile — no GPU/xvfb needed.
      # --require-module: the hosted pins exist (native-vkd3d-wasm-1.17), so a module
      # missing in CI = restore infrastructure failure — the gate must go RED, never
      # skip itself green. The loud-skip branch remains for LOCAL runs without the flag.
      # ── Phase 4.1 G1 — vkd3d->WASM seam byte-identity (node, no browser) ──
      # The PER-STAGE companion of G2 below: the dotnet Vkd3dCorpusProbe captures every
      # vkd3d compile the REAL desktop pipeline issues, then node replays each through
      # the product shim (shadowdusk-vkd3d.js) and asserts byte-identity at the exact
      # seam that differs between hosts. Cheap (no Chromium, no publish) and already in
      # the repo — wiring it here (2026-06-12 review) closes the gap where only G2 ran
      # in CI. Needs the restored module (hard-gated above) + desktop vkd3d native
      # (restored by tools/restore.sh above); its own loud-skip branches cover the rest.
      - name: Phase 4.1 G1 — vkd3d-WASM seam byte-identity gate (node)
        working-directory: tests/ShadowDusk.BrowserTests
        timeout-minutes: 25
        run: node node-test-vkd3d-wasm.mjs

      - name: Phase 4.1 G2 — in-browser DX/FNA byte-identity gate
        working-directory: tests/ShadowDusk.BrowserTests
        timeout-minutes: 25
        run: node browser-vkd3d-gate.mjs --require-module

      - name: Upload browser results + diffs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: browser-results
          path: |
            tests/ShadowDusk.BrowserTests/RESULTS*.md
            tests/ShadowDusk.BrowserTests/**/diffs/**
          if-no-files-found: ignore
          retention-days: 14

  # ── Standing vkd3d export gate (push-to-main + daily schedule) ──────────────
  # The CHEAP standing coverage (2026-06-12 review): only browser-vkd3d-gate.mjs
  # --require-module — pure compile in headless Chromium, no GPU/xvfb, no render
  # harness — so the Phase 4.1 G2 byte-identity proof and the SD1902/SD1903 module
  # scenarios can't rot unobserved between labelled heavy runs. The heavy render jobs
  # above stay dispatch/label-gated as designed.
  vkd3d-export-gate:
    name: vkd3d export gate (standing)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: |
      github.event_name == 'push' ||
      github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Cache NuGet
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-wasm-${{ runner.os }}-${{ hashFiles('**/packages.lock.json', '**/Directory.Packages.props') }}
          restore-keys: |
            nuget-wasm-${{ runner.os }}-

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      # Needed for the gate's internal `dotnet publish` of the ShaderFiddle.Web sample
      # (the real consumer app whose published output Chromium loads).
      - name: Install WASM workload
        run: dotnet workload install wasm-tools

      # Restores the pinned vkd3d-shader.{js,wasm} into the package wwwroot. No
      # `|| true`: a non-zero exit is a genuine script failure that must go red.
      - name: Restore native tools
        run: |
          chmod +x tools/restore.sh
          ./tools/restore.sh

      - name: Install harness deps (Playwright)
        working-directory: tests/ShadowDusk.BrowserTests
        run: npm install

      - name: Install Playwright Chromium
        working-directory: tests/ShadowDusk.BrowserTests
        run: npx playwright install --with-deps chromium

      # --require-module: the pinned module is hosted, so a missing module in CI is a
      # restore-infrastructure failure — the gate goes RED, never skips itself green.
      - name: Phase 4.1 G2 — in-browser DX/FNA byte-identity gate
        working-directory: tests/ShadowDusk.BrowserTests
        timeout-minutes: 25
        run: node browser-vkd3d-gate.mjs --require-module
