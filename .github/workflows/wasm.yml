# .github/workflows/wasm.yml
# Phase 30 §16 — WASM build + headless-browser render validation. This is the
# workflow Phases 22/23/24/100 defer their browser/WASM proof to.
#
# It is SEPARATE from the desktop matrix (different toolchain, slower, browser-gated)
# and never blocks the fast unit CI. It runs on pushes to main and on PRs labelled
# `run-browser`.
#
# Two jobs:
#   wasm-build       — wasm-tools workload (emscripten 3.1.34 pin), build/publish the
#                      net8.0-browser ShadowDusk.Wasm + ShaderFiddle.Web sample, and
#                      pack ShadowDusk.Wasm (the 6th NuGet package) IF the gitignored
#                      dxcompiler.wasm is present (its VerifyDxcWasmPresent target
#                      hard-fails the pack otherwise — see §17.2).
#   browser-smoke    — Phase 24 Playwright harness: mode-1 render + the Phase 33
#                      issue-#7 HiDef/WebGL2 regression guard (--corpus=sd-hidef).
#
# ── KNOWN STUBS / RUNTIME-ONLY (flagged per §16) ──────────────────────────────
#   * The faithful DXC->WASM module (dxcompiler.wasm, ~17.4 MB) and spirv-cross.wasm
#     are GITIGNORED, out-of-band emscripten builds (tools/restore.* document the
#     recipe; .wasm-build/ holds the scripts). CI cannot reconstruct them from a clean
#     checkout without the multi-GB DXC/LLVM source build, so:
#       - the Wasm PACK step is GUARDED on the .wasm being present and SKIPS cleanly
#         when it is absent (logging why) rather than red-failing the workflow;
#       - the mode-2 faithful in-browser-compile smoke (§16.3) is likewise guarded.
#     To make these unconditional, host the pinned .wasm artifacts (SHA-256-verified,
#     §16.1) so tools/restore.* can download them — tracked as the open §16 tail.
#   * mode-1 + the HiDef issue-#7 guard need ONLY the committed sample + KNI runtime,
#     so they run unconditionally and are the load-bearing browser gate here.
name: WASM & Browser

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
    # Include `labeled` so adding the `run-browser` label actually (re)triggers this
    # workflow — the browser job is gated on that label (see its `if:`), but the default
    # pull_request event types (opened/synchronize/reopened) don't fire on labeling.
    types: [ opened, synchronize, reopened, labeled ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: '1'
  DOTNET_NOLOGO: '1'
  DOTNET_CLI_TELEMETRY_OPTOUT: '1'
  # emscripten pin = the .NET 8 WASM runtime version; a mismatch fails at link/load,
  # not cleanly (Phase 23 hard constraint). The wasm-tools workload carries this; any
  # native emscripten build (spirv-cross.wasm / the faithful dxcompiler.wasm) must use
  # the same 3.1.34 via tools/restore.*.
  EMSCRIPTEN_VERSION: '3.1.34'

jobs:
  # ── Build the WASM sample + pack ShadowDusk.Wasm ───────────────────────────
  wasm-build:
    name: WASM build & pack
    runs-on: ubuntu-latest
    # Browser/WASM is heavy: run on push to main and on PRs labelled run-browser.
    if: |
      github.event_name == 'push' ||
      contains(github.event.pull_request.labels.*.name, 'run-browser')
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-wasm-${{ runner.os }}-${{ hashFiles('**/packages.lock.json', '**/Directory.Packages.props') }}
          restore-keys: |
            nuget-wasm-${{ runner.os }}-

      - name: Install WASM workload (carries emscripten ${{ env.EMSCRIPTEN_VERSION }})
        run: dotnet workload install wasm-tools

      # Restore the gitignored WASM native artifacts (dxcompiler.wasm / spirv-cross.wasm).
      # Non-fatal: the script no-ops with the build recipe when they are absent. Whether
      # they landed gates the Wasm pack + the faithful mode-2 smoke below.
      - name: Restore WASM native artifacts
        run: |
          chmod +x tools/restore.sh
          ./tools/restore.sh || true

      - name: Check faithful DXC->WASM presence
        id: dxcwasm
        run: |
          if [ -f src/ShadowDusk.Wasm/wwwroot/dxc/dxcompiler.wasm ]; then
            echo "present=true"  >> "$GITHUB_OUTPUT"
            echo "dxcompiler.wasm present — Wasm build/pack + faithful smoke ENABLED."
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::warning::dxcompiler.wasm absent (gitignored, out-of-band emscripten build). Skipping ShadowDusk.Wasm build/pack + faithful mode-2 smoke. See tools/restore.sh recipe / §16 open tail."
          fi

      - name: dotnet restore (browser projects)
        if: steps.dxcwasm.outputs.present == 'true'
        run: |
          dotnet restore src/ShadowDusk.Wasm/ShadowDusk.Wasm.csproj
          dotnet restore samples/ShaderFiddle.Web/ShaderFiddle.Web.csproj

      - name: Publish ShaderFiddle.Web (net8.0-browser)
        if: steps.dxcwasm.outputs.present == 'true'
        run: >
          dotnet publish samples/ShaderFiddle.Web/ShaderFiddle.Web.csproj
          -c Release -o publish/shaderfiddle --no-restore

      - name: Verify WASM publish output
        if: steps.dxcwasm.outputs.present == 'true'
        run: |
          fw=publish/shaderfiddle/wwwroot/_framework
          test -d "$fw" || (echo "::error::_framework/ missing in publish output" && exit 1)
          ls "$fw"/*.wasm >/dev/null 2>&1 || (echo "::error::no _framework/*.wasm in publish output" && exit 1)
          echo "WASM publish OK — _framework/*.wasm present."

      - name: Pack ShadowDusk.Wasm (6th NuGet package)
        if: steps.dxcwasm.outputs.present == 'true'
        run: >
          dotnet pack src/ShadowDusk.Wasm/ShadowDusk.Wasm.csproj
          -c Release -o nupkg --no-restore
          /p:Version=$(grep -oP '<Version>\K[^<]+' Directory.Build.props | head -n1)
          /p:IncludeSymbols=true /p:SymbolPackageFormat=snupkg

      # Uploaded for the Release workflow's nuget-push to glob alongside the desktop set.
      - name: Upload Wasm package
        if: steps.dxcwasm.outputs.present == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: nupkg-wasm
          path: |
            nupkg/ShadowDusk.Wasm.*.nupkg
            nupkg/ShadowDusk.Wasm.*.snupkg
          if-no-files-found: error
          retention-days: 30

  # ── Headless-browser render smoke (Phase 24 harness) ───────────────────────
  browser-smoke:
    name: Browser render smoke
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' ||
      contains(github.event.pull_request.labels.*.name, 'run-browser')
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-wasm-${{ runner.os }}-${{ hashFiles('**/packages.lock.json', '**/Directory.Packages.props') }}
          restore-keys: |
            nuget-wasm-${{ runner.os }}-

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install WASM workload
        run: dotnet workload install wasm-tools

      - name: Restore native tools
        run: |
          chmod +x tools/restore.sh
          ./tools/restore.sh || true

      # Phase 21 AV-allowance note doesn't apply on GitHub-hosted Linux (no Defender),
      # but generous timeouts here cover cold WASM publish + first Chromium launch.
      - name: Install harness deps (Playwright + pngjs)
        working-directory: tests/ShadowDusk.BrowserTests
        run: npm install

      - name: Install Playwright Chromium
        working-directory: tests/ShadowDusk.BrowserTests
        run: npx playwright install --with-deps chromium

      # ── mode-1: precompiled .mgfx load + render in KNI WebGL (Reach baseline) ──
      # Uses deterministic software GL (ANGLE/SwiftShader) inside the harness so the
      # pixel compare reproduces across runners.
      - name: Mode-1 render smoke (KNI Reach / WebGL1)
        working-directory: tests/ShadowDusk.BrowserTests
        timeout-minutes: 25
        run: |
          node publish-sample-sd.mjs
          node run-harness.mjs --corpus=sd

      # ── Phase 33 / issue #7 regression guard: KNI HiDef / WebGL2 (GLSL ES 3.00) ──
      # The harness returns 0 for BOTH a clean GREEN and a reproduced-RED (its original
      # Task-0 semantics), so the exit code alone is NOT a regression guard. Assert the
      # GREEN results file was written and the RED repro file was NOT — a regression to a
      # raw gl_FragColor write would flip the harness to RED and trip this.
      - name: Issue #7 HiDef/WebGL2 regression guard
        working-directory: tests/ShadowDusk.BrowserTests
        timeout-minutes: 25
        run: |
          rm -f RESULTS-SD-HIDEF.md RESULTS-SD-HIDEF-REPRO.md
          node publish-sample-sd-hidef.mjs
          node run-harness.mjs --corpus=sd-hidef
          if [ -f RESULTS-SD-HIDEF-REPRO.md ]; then
            echo "::error::issue #7 REGRESSED — KNI HiDef/WebGL2 reproduced the gl_FragColor load failure (RESULTS-SD-HIDEF-REPRO.md written)."
            cat RESULTS-SD-HIDEF-REPRO.md
            exit 1
          fi
          if [ ! -f RESULTS-SD-HIDEF.md ]; then
            echo "::error::HiDef harness wrote neither GREEN nor RED results — ambiguous/failed run."
            exit 1
          fi
          echo "GREEN — issue #7 guard holds: corpus loads + renders in KNI HiDef/WebGL2."

      - name: Upload browser results + diffs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: browser-results
          path: |
            tests/ShadowDusk.BrowserTests/RESULTS*.md
            tests/ShadowDusk.BrowserTests/**/diffs/**
          if-no-files-found: ignore
          retention-days: 14
