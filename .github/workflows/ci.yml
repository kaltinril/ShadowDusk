# .github/workflows/ci.yml
# Continuous integration: build + test on Linux, macOS, and Windows on every
# push/PR. This is Phase 30 §6, reconciled with the AS-BUILT native strategy:
#
#   * SPIRV-Cross (OpenGL path) ships TRANSITIVELY via the Silk.NET.SPIRV.Cross.Native
#     NuGet, and DXC via Vortice.Dxc — both are restored by `dotnet restore` and live
#     in the NuGet package cache. There is NO `tools/spirv-cross/` bundling step (the
#     doc's §3/§4 manual-bundle + native-versions.json model is OBSOLETE here).
#   * The DirectX DXBC backend's `vkd3d-shader` native is a RESTORED, non-redistributed
#     artifact. `tools/restore.*` verifies/recipes it and NO-OPs gracefully when absent
#     (vkd3d is opt-in; the default DXBC backend is the d3dcompiler_47 oracle). We run it
#     so the DX `.fx` reach path is exercised wherever a vkd3d binary is available.
name: CI

on:
  # Skip the build/test matrix for doc-/plan-only changes (READMEs, plan/, docs/, docfx/,
  # CHANGELOG, etc.) — they don't affect the build, so don't burn Actions minutes on them.
  push:
    branches: [ main ]
    paths-ignore: [ '**/*.md', 'plan/**', 'docs/**', 'docfx/**', 'LICENSE', '.gitignore' ]
  pull_request:
    branches: [ main ]
    paths-ignore: [ '**/*.md', 'plan/**', 'docs/**', 'docfx/**', 'LICENSE', '.gitignore' ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: '1'
  DOTNET_NOLOGO: '1'
  DOTNET_CLI_TELEMETRY_OPTOUT: '1'

jobs:
  build-and-test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    # Build + unit tests finish in ~1-3 min per OS; the ubuntu lane additionally renders
    # the ImageTests for real on Mesa llvmpipe (software rasterizer — slower than a GPU),
    # so 15 gives headroom. This also bounds the macOS `dotnet test` host-exit stall —
    # now fixed at the source (the GLFW init that left a non-background Cocoa thread is
    # skipped on macOS, see GlContextFixture), with this as the backstop. fail-fast:false
    # keeps each OS reporting independently.
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      # NuGet cache carries the cross-platform native deps (SPIRV-Cross, DXC) — the
      # OpenGL + DXC in-memory path is self-contained from NuGet. Key on the lock files
      # and the central version pins so a dependency change invalidates the cache.
      - name: Cache NuGet
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/packages.lock.json', '**/Directory.Packages.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      # The pinned vkd3d-shader natives (all four RIDs) restore by download +
      # SHA-256 verify (Phase 37 C); cache them so the GitHub Release download
      # runs once per runner image, not per job. The restore script self-heals a
      # stale/corrupt cache (hash mismatch -> re-download).
      - name: Cache vkd3d natives
        uses: actions/cache@v5
        with:
          path: tools/vkd3d
          key: vkd3d-1.17-${{ runner.os }}

      # Same pattern for the pinned macOS DXC dylibs (Phase 37 A).
      - name: Cache DXC macOS natives
        uses: actions/cache@v5
        with:
          path: tools/dxc
          key: dxc-1.7.2212.40-${{ runner.os }}

      # Restore the vkd3d-shader natives (DirectX DXBC backend + the FNA target's
      # engine) and the macOS DXC dylibs (OpenGL frontend on macOS, Phase 37 A).
      # Non-fatal: when the download is unavailable the script warns and the
      # cross-platform build stays green (vkd3d-dependent tests skip / fail SD0211
      # loudly). When present the binaries are copied into build output and the DX/FNA
      # `.fx` reach paths run (Phase 18 carry-forward; Phase 39 FNA CI net).
      - name: Restore native tools (Linux / macOS)
        if: runner.os != 'Windows'
        run: |
          chmod +x tools/restore.sh
          ./tools/restore.sh || true

      - name: Restore native tools (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./tools/restore.ps1

      - name: dotnet restore
        run: dotnet restore ShadowDusk.slnx --locked-mode

      - name: dotnet build
        run: dotnet build ShadowDusk.slnx --no-restore -c Release

      # ── Real GL rendering on the ubuntu lane (Phase 37 verification tail, items 3+4) ──
      # ubuntu runners are headless: without a display GlContextFixture cannot create its
      # GL 3.3 Compatibility context and every ImageTests render test SOFT-SKIPS AS PASS.
      # That soft-skip once fabricated "27/27 green in 73 ms" runs that never invoked DXC,
      # masking a total Linux compile failure (Phase 37 Finding B). Mirror wasm.yml's
      # proven browser-smoke recipe — xvfb (X virtual framebuffer) + Mesa llvmpipe
      # (software GL; Mesa 24.x on ubuntu-latest advertises 4.5 Compatibility, covering
      # the fixture's deliberate 3.3 Compatibility request) — so the lane actually renders
      # the golden corpus. The extra libx*/libxkbcommon packages are GLFW's X11 client
      # deps (the wasm.yml recipe used SDL via MonoGame; ImageTests use GLFW via Silk.NET).
      - name: Install xvfb + Mesa software GL (ImageTests real rendering)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libgl1-mesa-dri libglu1-mesa mesa-utils \
            libx11-6 libxi6 libxrandr2 libxinerama1 libxcursor1 libxkbcommon0

      # Empirical check (not assumed): print the Compatibility-profile version llvmpipe
      # actually advertises under xvfb. The hard gate is SHADOWDUSK_REQUIRE_GL below —
      # if the fixture can't create its 3.3 Compatibility context, the test step FAILS
      # loudly — but this line puts the driver evidence in the log for humans.
      - name: Verify llvmpipe GL Compatibility profile (diagnostic)
        if: runner.os == 'Linux'
        env:
          LIBGL_ALWAYS_SOFTWARE: "1"
        run: xvfb-run -a glxinfo -B

      # Unit tests on the fast PR path (Category!=Integration).
      #
      # Phase34TextureBreadthTests live-compile the advanced 3D-texture / explicit-LOD /
      # gradient-sampling shaders (Phase 34's HiDef examples). These COMPILE on Windows but
      # currently FAIL to compile on the Linux/macOS DXC build (the cross-platform reach gap
      # for those specific intrinsics — see the Phase 30 known-gaps note in the PR). They
      # run on Windows only until that discrepancy is investigated. Everything else —
      # including the same-machine MgfxcCrossValidation cross-val and the ImageRegression
      # render proxy — runs on every OS, so cross-platform COMPILE reach for the normal
      # corpus is proven here, with the integration job as the heavier end-to-end check.
      #
      # GL-render coverage per lane (Phase 37 tail items 3+4):
      #   * ubuntu  — RENDERS FOR REAL under xvfb-run + llvmpipe. SHADOWDUSK_REQUIRE_GL=1
      #               makes "no GL context" a hard failure, so a regression back to the
      #               silent headless soft-skip turns this lane red instead of green.
      #   * windows — SOFT-SKIPS (visibly): windows-latest runners expose only GDI Generic
      #               OpenGL 1.1, so the GL 3.3 Compatibility context cannot be created.
      #               Real-GPU GL coverage for Windows is the local dev run (the suite
      #               renders fully there); do NOT set SHADOWDUSK_REQUIRE_GL here.
      #   * macos   — SOFT-SKIPS (visibly) BY PLATFORM DESIGN: Apple caps the native GL
      #               Compatibility profile at 2.1 and GLFW cannot exit cleanly headless
      #               (see GlContextFixture). This is the remaining platform wall.
      - name: dotnet test (unit, Windows — full; GL renders only on GPU-equipped hosts)
        if: runner.os == 'Windows'
        run: >
          dotnet test ShadowDusk.slnx --no-build -c Release
          --filter "Category!=Integration"
          --logger "trx;LogFileName=unit-${{ matrix.os }}.trx"
          --results-directory TestResults/

      # Diagnostic for the GLFW native (the previous, pre-xvfb soft-skip reason on this
      # runner family was "GlfwPlatform - not applicable" = Glfw.GetApi() could not LOAD
      # libglfw.so.3 — not a display problem; the identical bin output loads fine in a
      # headless Debian 12 container and in WSL2 ubuntu-24.04). Prints presence + linkage
      # so a load failure here is diagnosable from the log instead of a Silk.NET one-liner.
      - name: GLFW native load diagnostic
        if: runner.os == 'Linux'
        run: |
          so=$(find tests/ShadowDusk.ImageTests/bin -path "*linux-x64*" -name "libglfw.so.3" | head -n1)
          if [ -z "$so" ]; then
            echo "::warning::libglfw.so.3 NOT in ImageTests bin output (runtimes/linux-x64/native)"
            echo "--- ultz.native.glfw in NuGet cache ---"
            find ~/.nuget/packages/ultz.native.glfw -type f 2>/dev/null || echo "(absent from cache)"
          else
            ls -la "$so"; file "$so" || true; ldd "$so" || true
          fi

      # Phase34LodGradRenderTests are additionally excluded on Linux — a DOCUMENTED
      # STRUCTURAL exclusion, not a tolerance: Mesa's strict GLSL front-end rejects
      # `textureLod`/`textureGrad` in the implicit-#version-110 legacy dialect these
      # tests' shaders use ("0:13(17): error: no function with name 'textureLod'",
      # observed on llvmpipe Mesa 22.3.6 + 25.2.8, 2026-06-11). The dev NVIDIA driver
      # accepts those builtins in the legacy dialect (Windows real-GPU runs stay the
      # coverage). Masking this with a tolerance would hide a real driver-strictness
      # divergence — recorded in plan/PHASE-37 as a Phase 34 follow-up instead.
      - name: dotnet test (unit, Linux — REAL GL render under xvfb/llvmpipe, REQUIRE_GL hard gate)
        if: runner.os == 'Linux'
        env:
          # Pin Mesa's software rasterizer even if a GPU device node exists (same as wasm.yml).
          LIBGL_ALWAYS_SOFTWARE: "1"
          # Phase 37 tail item 4: no GL context => ImageTests FAIL loudly, never pass-by-skip.
          SHADOWDUSK_REQUIRE_GL: "1"
        run: >
          xvfb-run -a dotnet test ShadowDusk.slnx --no-build -c Release
          --filter "Category!=Integration&FullyQualifiedName!~Phase34TextureBreadthTests&FullyQualifiedName!~Phase34LodGradRenderTests"
          --logger "trx;LogFileName=unit-${{ matrix.os }}.trx"
          --results-directory TestResults/

      - name: dotnet test (unit, macOS — advanced-texture compile tests excluded; GL proxy N/A)
        if: runner.os == 'macOS'
        run: >
          dotnet test ShadowDusk.slnx --no-build -c Release
          --filter "Category!=Integration&FullyQualifiedName!~Phase34TextureBreadthTests"
          --logger "trx;LogFileName=unit-${{ matrix.os }}.trx"
          --results-directory TestResults/

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ matrix.os }}
          path: TestResults/*.trx
          retention-days: 7

  # Slow path: integration tests (CLI child-process spawn + native DXC/SPIRV-Cross).
  # Runs automatically on pushes to main; on PRs only when the 'run-integration'
  # label is applied (heavyweight + AV-scan-sensitive, see CLAUDE.md Phase 21).
  integration-tests:
    name: Integration Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: build-and-test
    # Heavier than the unit gate (CLI child-process spawn + native DXC/SPIRV-Cross), but
    # the runsettings TestSessionTimeout caps the suite at 5 min; 12 is a safe job backstop.
    timeout-minutes: 12
    if: |
      github.event_name == 'push' ||
      contains(github.event.pull_request.labels.*.name, 'run-integration')
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Cache NuGet
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/packages.lock.json', '**/Directory.Packages.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Cache vkd3d natives
        uses: actions/cache@v5
        with:
          path: tools/vkd3d
          key: vkd3d-1.17-${{ runner.os }}

      - name: Cache DXC macOS natives
        uses: actions/cache@v5
        with:
          path: tools/dxc
          key: dxc-1.7.2212.40-${{ runner.os }}

      - name: Restore native tools (Linux / macOS)
        if: runner.os != 'Windows'
        run: |
          chmod +x tools/restore.sh
          ./tools/restore.sh || true

      - name: Restore native tools (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./tools/restore.ps1

      - name: dotnet restore
        run: dotnet restore ShadowDusk.slnx --locked-mode

      - name: dotnet build
        run: dotnet build ShadowDusk.slnx --no-restore -c Release

      # The suite-level 5-minute TestSessionTimeout guardrail (CLAUDE.md Phase 21 /
      # ShadowDusk.runsettings) backstops the per-test CancellationToken timeouts so a
      # cold-AV-scan hang fails fast instead of eating 20+ minutes.
      - name: dotnet test (integration)
        run: >
          dotnet test ShadowDusk.slnx --no-build -c Release
          --filter "Category=Integration"
          --settings ShadowDusk.runsettings
          --logger "trx;LogFileName=integration-${{ matrix.os }}.trx"
          --results-directory TestResults/

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: integration-results-${{ matrix.os }}
          path: TestResults/*.trx
          retention-days: 14
