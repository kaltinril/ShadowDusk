# .github/workflows/release.yml
# Release pipeline (Phase 30 §7 + §17.2/§17.3). DISPATCH-ONLY: a maintainer runs
# Actions → Release → Run workflow with a `version` input (see the `on:` block below —
# there is no tag-push trigger; tags are markers, never publish triggers). A `validate`
# job guards everything: the dispatch version MUST equal Directory.Build.props
# <Version> (the single source of truth, §17.1) or the run fails before anything is
# published.
#
# Pipeline:
#   validate          → resolve + guard the version
#   build-and-test    → 3-OS build + full test gate
#   pack-desktop      → pack the FIVE desktop packages (Core/HLSL/GLSL/Compiler/Cli)
#                       at the validated version, with symbols (.snupkg)
#   pack-wasm         → pack ShadowDusk.Wasm (the SIXTH package) in THIS workflow —
#                       its own job because it needs the wasm-tools workload and the
#                       restored dxcompiler.wasm (its `VerifyDxcWasmPresent` MSBuild
#                       target hard-fails the pack otherwise)
#   publish           → per-RID self-contained `ShadowDuskCLI` CLI archives (+ smoke)
#   nuget-push        → push every nupkg/snupkg (idempotent --skip-duplicate)
#   github-release    → GitHub Release with the CLI archives + packages
#
# Native strategy is the AS-BUILT one (see ci.yml header): SPIRV-Cross + DXC are
# transitive NuGet, vkd3d-shader is restored non-fatally. No tools/spirv-cross bundling.
name: Release

on:
  # DISPATCH-ONLY by design: publishing is always a deliberate, human-run action.
  # A maintainer runs Actions → Release → Run workflow and enters the version. We do
  # NOT auto-publish on tag push — the agent may push a v<version> tag as a marker, but
  # the publish itself is manual (matches the KernSmith release flow: agent tags, human
  # runs publish). The github-release job attaches to / creates the v<version> tag.
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.1.0)'
        required: true
        type: string

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: '1'
  DOTNET_NOLOGO: '1'
  DOTNET_CLI_TELEMETRY_OPTOUT: '1'

jobs:
  # ── Resolve + guard the release version ────────────────────────────────────
  validate:
    name: Validate version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve version (input or tag, strip leading 'v')
        id: resolve
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify version matches Directory.Build.props
        run: |
          want="${{ steps.resolve.outputs.version }}"
          have=$(grep -oP '<Version>\K[^<]+' Directory.Build.props | head -n1)
          echo "Requested: $want   Directory.Build.props: $have"
          if [ "$have" != "$want" ]; then
            echo "::error::Release version ($want) != Directory.Build.props ($have). Merge a version-bump PR first (use /release)."
            exit 1
          fi

  # ── Build + test on all 3 OS before releasing ──────────────────────────────
  build-and-test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: validate
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        # All three OSes run the release build + unit gate again, and ALL THREE are hard
        # gates (the pre-Phase-37 continue-on-error that kept ubuntu/macOS informational
        # is gone — its rationale, "DXC's native fails to load on macOS", was fixed by
        # Phase 37 A's restored dylib). The macOS `dotnet test` host-exit hang that
        # previously forced macOS out is also fixed at the source (GlContextFixture no
        # longer initializes GLFW on macOS — see its comment).
        os: [ ubuntu-latest, macos-latest, windows-latest ]
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Cache NuGet
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/packages.lock.json', '**/Directory.Packages.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      # No `|| true`: restore.sh exits 0 for the optional spirv-cross miss (parity with
      # restore.ps1 since 2026-06-12), so a non-zero exit is a genuine failure.
      - name: Restore native tools (Linux / macOS)
        if: runner.os != 'Windows'
        run: |
          chmod +x tools/restore.sh
          ./tools/restore.sh

      - name: Restore native tools (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./tools/restore.ps1

      - name: dotnet restore
        run: dotnet restore ShadowDusk.slnx --locked-mode

      - name: dotnet build
        run: dotnet build ShadowDusk.slnx --no-restore -c Release

      # Unit gate ONLY (Category!=Integration), mirroring ci.yml — the heavier
      # Integration suite is ci.yml's push-to-main job (the release is cut from main,
      # which has already passed it on all three OSes). All three OSes are HARD gates:
      # the old continue-on-error for ubuntu/macOS rested on a pre-Phase-37 rationale
      # ("DXC's native fails to load on macOS") that Phase 37 A/B fixed — a red unit
      # suite on any OS is a real defect and must block the release.
      - name: dotnet test (unit)
        run: >
          dotnet test ShadowDusk.slnx --no-build -c Release
          --filter "Category!=Integration"
          --settings ShadowDusk.runsettings
          --logger "trx;LogFileName=release-test-${{ matrix.os }}.trx"
          --results-directory TestResults/

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: release-test-results-${{ matrix.os }}
          path: TestResults/*.trx
          retention-days: 30

  # ── Pack the five desktop packages (Wasm is packed in wasm.yml) ────────────
  pack-desktop:
    name: Pack desktop NuGet packages
    runs-on: ubuntu-latest
    needs: [ validate, build-and-test ]
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Cache NuGet
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/packages.lock.json', '**/Directory.Packages.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      # Same native caches as ci.yml: the pack below bundles these into the nupkg, so
      # the pinned downloads should hit the cache, with restore self-healing a stale
      # or corrupt entry by hash.
      - name: Cache vkd3d natives
        uses: actions/cache@v5
        with:
          path: tools/vkd3d
          key: vkd3d-1.17-${{ runner.os }}

      - name: Cache DXC macOS natives
        uses: actions/cache@v5
        with:
          path: tools/dxc
          key: dxc-1.7.2212.40-${{ runner.os }}

      # No `|| true`: a genuine restore failure must fail the release, not surface
      # later as a broken package.
      - name: Restore native tools
        run: |
          chmod +x tools/restore.sh
          ./tools/restore.sh

      # HARD GATE before packing (mirrors ci.yml's integration job): every native the
      # nupkg must bundle has a hosted, pinned asset — a missing file here is a restore
      # failure that would otherwise become a broken published package.
      - name: Verify restored natives present (hard gate)
        run: |
          missing=0
          for f in \
            'tools/vkd3d/libvkd3d-shader-1.dll' \
            'tools/vkd3d/libvkd3d-shader.so.1' \
            'tools/vkd3d/osx-x64/libvkd3d-shader.1.dylib' \
            'tools/vkd3d/osx-arm64/libvkd3d-shader.1.dylib' \
            'tools/dxc/osx-x64/libdxcompiler.dylib' \
            'tools/dxc/osx-arm64/libdxcompiler.dylib' ; do
              if [ ! -f "$f" ]; then
                echo "::error::restored native missing: $f — tools/restore.sh failed to provision a hosted, pinned asset. Packing now would ship a package broken on that RID; failing the release instead."
                missing=1
              fi
          done
          exit $missing

      - name: dotnet restore
        run: dotnet restore ShadowDusk.slnx --locked-mode

      # Pack the five desktop packages at the validated version, with symbol
      # packages (.snupkg). The Version override is belt-and-braces — it already
      # equals Directory.Build.props per the validate guard — but keeps the pack
      # explicit and matches a workflow_dispatch where the tag may not exist yet.
      - name: Pack desktop packages
        run: |
          for proj in \
            src/ShadowDusk.Core/ShadowDusk.Core.csproj \
            src/ShadowDusk.HLSL/ShadowDusk.HLSL.csproj \
            src/ShadowDusk.GLSL/ShadowDusk.GLSL.csproj \
            src/ShadowDusk.Compiler/ShadowDusk.Compiler.csproj \
            src/ShadowDusk.Cli/ShadowDusk.Cli.csproj ; do
              dotnet pack "$proj" -c Release --no-restore -o nupkg \
                /p:Version=${{ needs.validate.outputs.version }} \
                /p:IncludeSymbols=true /p:SymbolPackageFormat=snupkg
          done

      - name: Verify packages were produced
        run: |
          ls -la nupkg/
          count=$(find nupkg -maxdepth 1 -name '*.nupkg' | wc -l)
          echo "Found $count .nupkg files"
          if [ "$count" -lt 5 ]; then
            echo "::error::Expected 5 desktop .nupkg, found $count"
            exit 1
          fi

      # ShadowDusk.HLSL's native packing is restore-state-dependent (csproj entries are
      # Condition="Exists(...)"): a pack on a machine without the restored binaries
      # SILENTLY produces a package whose FNA target and DxbcBackend.Vkd3d fail with
      # SD0211 — and, for the Phase 37 A macOS DXC dylibs, whose ENTIRE OpenGL pipeline
      # dies with DllNotFoundException on every Mac — for every NuGet consumer,
      # directly contradicting the documented self-contained promise. Fail the release
      # red instead (the mirror of the pack-wasm dxcompiler.wasm gate; same list as
      # pack-consume.yml's pack gate). tools/restore.sh provisions everything by pinned
      # download (Phase 37 A/C), so a clean CI runner satisfies this gate.
      # The LGPL-2.1 notice must ride along with the binaries it covers.
      - name: Verify ShadowDusk.HLSL contains all natives (vkd3d ×4 RIDs + macOS DXC ×2) + LGPL notice
        run: |
          pkg=$(find nupkg -maxdepth 1 -name 'ShadowDusk.HLSL.*.nupkg' ! -name '*.snupkg' | head -1)
          echo "Inspecting $pkg"
          listing=$(unzip -l "$pkg")
          missing=0
          for native in \
            'runtimes/win-x64/native/libvkd3d-shader-1.dll' \
            'runtimes/linux-x64/native/libvkd3d-shader.so.1' \
            'runtimes/osx-x64/native/libvkd3d-shader.1.dylib' \
            'runtimes/osx-arm64/native/libvkd3d-shader.1.dylib' \
            'runtimes/osx-x64/native/libdxcompiler.dylib' \
            'runtimes/osx-arm64/native/libdxcompiler.dylib' \
            'THIRD-PARTY-NOTICES.txt' ; do
              if ! grep -qF "$native" <<<"$listing"; then
                echo "::error::$pkg is missing $native — a consumer on that RID gets a broken package (SD0211 for vkd3d paths; DllNotFoundException for the macOS OpenGL pipeline). Restore natives before packing (tools/restore.sh; RELEASING.md 'Native binaries')."
                missing=1
              fi
          done
          exit $missing

      - name: Upload packages
        uses: actions/upload-artifact@v7
        with:
          name: nupkg-desktop
          path: |
            nupkg/*.nupkg
            nupkg/*.snupkg
          if-no-files-found: error
          retention-days: 30

  # ── Pack the 6th package: ShadowDusk.Wasm (in-browser KNI/Blazor compiler) ──
  # Separate job because it needs the wasm-tools workload and the dxcompiler.wasm
  # restored into wwwroot/dxc/ (tools/restore copies the committed
  # .wasm-build/dxc-wasm-out/dxcompiler.wasm there; VerifyDxcWasmPresent gates pack).
  # The .wasm ships INSIDE the package as a Blazor static web asset, so a consumer
  # just installs ShadowDusk.Wasm and the in-browser compiler self-registers.
  pack-wasm:
    name: Pack ShadowDusk.Wasm
    runs-on: ubuntu-latest
    needs: [ validate, build-and-test ]
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Cache NuGet
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/packages.lock.json', '**/Directory.Packages.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Install WASM workload
        run: dotnet workload install wasm-tools

      # Copies the committed .wasm-build/dxc-wasm-out/dxcompiler.wasm into
      # src/ShadowDusk.Wasm/wwwroot/dxc/ so the pack gate passes and the .wasm ships.
      # No `|| true`: a genuine restore failure must fail the release.
      - name: Restore WASM native artifacts
        run: |
          chmod +x tools/restore.sh
          ./tools/restore.sh

      - name: Verify dxcompiler.wasm restored
        run: |
          test -f src/ShadowDusk.Wasm/wwwroot/dxc/dxcompiler.wasm || \
            (echo "::error::dxcompiler.wasm not restored into wwwroot/dxc/ — tools/restore.sh failed to copy the committed .wasm-build copy" && exit 1)

      # Phase 4.1: the vkd3d->WASM module (browser DirectX-DXBC + FNA-fx_2_0 backend)
      # is downloaded by tools/restore.sh from the native-vkd3d-wasm-1.17 release
      # under SHA-256 pins. A stopped release beats shipping browser DX/FNA broken.
      # BOTH files are verified (a partial restore — js failed, wasm landed — would
      # ship DX/FNA permanently failing SD1902), and verified by RE-HASHING against
      # the pins extracted from tools/restore.sh (the single source of truth), not by
      # mere existence — defense in depth against a mismatched file left on disk.
      - name: Verify vkd3d-shader.{js,wasm} restored (hash-checked against restore.sh pins)
        run: |
          js_sha=$(grep -oP "^VKD3D_WASM_JS_SHA256=\"\K[0-9a-f]{64}" tools/restore.sh)
          wasm_sha=$(grep -oP "^VKD3D_WASM_WASM_SHA256=\"\K[0-9a-f]{64}" tools/restore.sh)
          if [ -z "$js_sha" ] || [ -z "$wasm_sha" ]; then
            echo "::error::could not extract the vkd3d-wasm SHA-256 pins from tools/restore.sh (variable renamed?) — refusing to release unverified."
            exit 1
          fi
          echo "$js_sha  src/ShadowDusk.Wasm/wwwroot/vkd3d/vkd3d-shader.js" | sha256sum -c - || \
            (echo "::error::vkd3d-shader.js missing or does not match the restore.sh pin — browser DirectX/FNA would fail SD1902 for every consumer" && exit 1)
          echo "$wasm_sha  src/ShadowDusk.Wasm/wwwroot/vkd3d/vkd3d-shader.wasm" | sha256sum -c - || \
            (echo "::error::vkd3d-shader.wasm missing or does not match the restore.sh pin — browser DirectX/FNA would fail SD1902 for every consumer" && exit 1)

      - name: Pack ShadowDusk.Wasm
        run: >
          dotnet pack src/ShadowDusk.Wasm/ShadowDusk.Wasm.csproj
          -c Release -o nupkg
          /p:Version=${{ needs.validate.outputs.version }}
          /p:IncludeSymbols=true /p:SymbolPackageFormat=snupkg

      - name: Verify Wasm package bundles the .wasm
        run: |
          pkg=$(find nupkg -maxdepth 1 -name 'ShadowDusk.Wasm.*.nupkg' | head -1)
          test -n "$pkg" || (echo "::error::ShadowDusk.Wasm .nupkg not produced" && exit 1)
          unzip -l "$pkg" | grep -q 'dxcompiler.wasm' || \
            (echo "::error::ShadowDusk.Wasm .nupkg does not contain dxcompiler.wasm" && exit 1)
          unzip -l "$pkg" | grep -q 'vkd3d-shader.wasm' || \
            (echo "::error::ShadowDusk.Wasm .nupkg does not contain vkd3d-shader.wasm — browser DirectX/FNA would fail SD1902 for every consumer" && exit 1)
          unzip -l "$pkg" | grep -q 'vkd3d-shader.js' || \
            (echo "::error::ShadowDusk.Wasm .nupkg does not contain vkd3d-shader.js (the module loader) — browser DirectX/FNA would fail SD1902 for every consumer" && exit 1)
          echo "ShadowDusk.Wasm packs with dxcompiler.wasm + vkd3d-shader.{js,wasm} bundled — OK"

      - name: Upload Wasm package
        uses: actions/upload-artifact@v7
        with:
          name: nupkg-wasm
          path: |
            nupkg/ShadowDusk.Wasm.*.nupkg
            nupkg/ShadowDusk.Wasm.*.snupkg
          if-no-files-found: error
          retention-days: 30

  # ── Self-contained `ShadowDuskCLI` publish per RID ─────────────────────────
  publish:
    name: Publish CLI (${{ matrix.rid }})
    runs-on: ${{ matrix.os }}
    needs: [ validate, build-and-test ]
    # `dotnet publish` only (no tests, ~30s observed) — 10 min is ample. The nuget-push job
    # does NOT depend on this, so the packages publish even if a per-RID CLI archive lags.
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: win-x64
            os: windows-latest
          - rid: linux-x64
            os: ubuntu-latest
          - rid: osx-x64
            os: macos-latest   # cross-publish from Apple Silicon runner
          - rid: osx-arm64
            os: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Cache NuGet
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/packages.lock.json', '**/Directory.Packages.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore native tools (Linux / macOS)
        if: runner.os != 'Windows'
        run: |
          chmod +x tools/restore.sh
          ./tools/restore.sh

      - name: Restore native tools (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./tools/restore.ps1

      # RID-targeted restore. The committed solution-level lock files are RID-agnostic
      # (net8.0 only), so a -r restore must re-evaluate the RID graph — it cannot run in
      # locked mode. RestoreLockedMode is otherwise forced on in CI (Directory.Build.props,
      # CI=true), so disable it explicitly for just this RID restore.
      - name: dotnet restore (RID)
        run: dotnet restore src/ShadowDusk.Cli/ShadowDusk.Cli.csproj -r ${{ matrix.rid }} -p:RestoreLockedMode=false

      - name: Publish self-contained (${{ matrix.rid }})
        run: >
          dotnet publish src/ShadowDusk.Cli/ShadowDusk.Cli.csproj
          -r ${{ matrix.rid }}
          --self-contained
          -c Release
          --no-restore
          -o publish/${{ matrix.rid }}
          /p:Version=${{ needs.validate.outputs.version }}
          /p:PublishSingleFile=true
          /p:IncludeNativeLibrariesForSelfExtract=true
          /p:EnableCompressionInSingleFile=true

      # The self-contained single-file publish names the apphost after <AssemblyName>
      # (ShadowDuskCLI). Verify it exists before archiving.
      - name: Verify binary exists (Linux / macOS)
        if: runner.os != 'Windows'
        run: |
          dir="publish/${{ matrix.rid }}"
          if [ ! -f "$dir/ShadowDuskCLI" ]; then
            echo "::error::ShadowDuskCLI binary not found in $dir/"
            ls -la "$dir" || true
            exit 1
          fi
          chmod +x "$dir/ShadowDuskCLI"

      - name: Verify binary exists (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (-not (Test-Path "publish\${{ matrix.rid }}\ShadowDuskCLI.exe")) {
            Write-Error "ShadowDuskCLI.exe not found in publish\${{ matrix.rid }}\"
            Get-ChildItem "publish\${{ matrix.rid }}" | Format-Table Name
            exit 1
          }

      # EXECUTION smoke (2026-06-12 review): existence + chmod proves nothing about the
      # single-file bundle actually working — a bad native-bundling change would still
      # ship. Run the published binary on a real fixture and require exit 0 + non-empty
      # .mgfx output. osx-x64 executes on the arm64 macos-latest runner under Rosetta 2
      # (preinstalled on GitHub macOS runners), so all four RIDs are smoked.
      - name: Smoke-run published CLI (Linux / macOS)
        if: runner.os != 'Windows'
        run: |
          out="$RUNNER_TEMP/smoke-${{ matrix.rid }}.mgfx"
          ./publish/${{ matrix.rid }}/ShadowDuskCLI tests/fixtures/shaders/Minimal.fx "$out" /Profile:OpenGL
          if [ ! -s "$out" ]; then
            echo "::error::published ${{ matrix.rid }} CLI exited 0 but produced a missing/empty .mgfx — the single-file bundle is broken."
            exit 1
          fi
          echo "smoke OK: $(stat -c%s "$out" 2>/dev/null || stat -f%z "$out") bytes"

      - name: Smoke-run published CLI (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $out = Join-Path $env:RUNNER_TEMP "smoke-${{ matrix.rid }}.mgfx"
          & ".\publish\${{ matrix.rid }}\ShadowDuskCLI.exe" tests\fixtures\shaders\Minimal.fx $out /Profile:OpenGL
          if ($LASTEXITCODE -ne 0) {
            Write-Error "published ${{ matrix.rid }} CLI exited $LASTEXITCODE"
            exit 1
          }
          if (-not (Test-Path $out) -or (Get-Item $out).Length -eq 0) {
            Write-Error "published ${{ matrix.rid }} CLI exited 0 but produced a missing/empty .mgfx — the single-file bundle is broken."
            exit 1
          }
          Write-Host "smoke OK: $((Get-Item $out).Length) bytes"

      - name: Archive publish output (Linux / macOS)
        if: runner.os != 'Windows'
        run: |
          cd publish
          tar -czf ../shadowdusk-${{ matrix.rid }}.tar.gz ${{ matrix.rid }}/

      - name: Archive publish output (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "publish\${{ matrix.rid }}\*" `
            -DestinationPath "shadowdusk-${{ matrix.rid }}.zip"

      - name: Upload publish artifact
        uses: actions/upload-artifact@v7
        with:
          name: shadowdusk-${{ matrix.rid }}
          path: |
            shadowdusk-${{ matrix.rid }}.tar.gz
            shadowdusk-${{ matrix.rid }}.zip
          if-no-files-found: error
          retention-days: 7

  # ── Push every package to NuGet.org ────────────────────────────────────────
  nuget-push:
    name: NuGet Push
    runs-on: ubuntu-latest
    needs: [ validate, pack-desktop, pack-wasm ]
    steps:
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Download desktop packages
        uses: actions/download-artifact@v8
        with:
          name: nupkg-desktop
          path: nupkg/

      # ShadowDusk.Wasm (the 6th package) is packed by the pack-wasm job in THIS run,
      # so its artifact is available here. All six packages publish together.
      - name: Download Wasm package
        uses: actions/download-artifact@v8
        with:
          name: nupkg-wasm
          path: nupkg/

      - name: Push to NuGet.org
        run: >
          dotnet nuget push "nupkg/*.nupkg"
          --api-key ${{ secrets.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

  # ── Create the GitHub Release with all assets ──────────────────────────────
  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [ validate, publish, nuget-push ]
    permissions:
      contents: write
    steps:
      - name: Download all CLI archives
        uses: actions/download-artifact@v8
        with:
          pattern: shadowdusk-*
          merge-multiple: true
          path: release-assets/

      - name: Download desktop packages
        uses: actions/download-artifact@v8
        with:
          name: nupkg-desktop
          path: release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ needs.validate.outputs.version }}
          name: v${{ needs.validate.outputs.version }}
          files: release-assets/*
          generate_release_notes: true
          fail_on_unmatched_files: true
